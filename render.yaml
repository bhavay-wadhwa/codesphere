services:
  - type: web
    name: codesphere
    runtime: node
    buildCommand: npm --prefix frontend ci && npm --prefix frontend run build && npm --prefix backend ci
    startCommand: npm --prefix backend start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_STATIC
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URL
        sync: false
      - key: FRONTEND_URL
        fromService:
          name: codesphere
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_SECURE
        value: "false"
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
